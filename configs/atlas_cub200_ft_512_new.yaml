base_config: base.yaml

main:
  exp_name: atlas_d2d10_base_r512_new
  tags: ["atlas", "finetune", "cub_200", "r512"]
  phases:
    train: True
    dev: True
    test: False
  checkpoints_dir: /home/others/abir_proj/codebase/Atlas/checkpoints/Atlas_cub200_ft_512_new
  wandb_project: architecture
  wandb_entity: yala-lab
  disable_wandb: True
  allow_overwriting_experiment_checkpoints: True
  ckpt_freq: 5
  schedulefree: False
  compile: False
  sync_bn: True
  find_unused_parameters: True

metrics:
  epoch_metrics:
    train:
      - type: Accuracy
    val:
      - type: Accuracy
    test:
      - type: Accuracy
  losses:
    - type: SoftTargetCrossEntropyLoss 
      weight: 1.0
      enable_at_train: True
      enable_at_eval: False
    - type: CrossEntropyLoss
      weight: 1.0
      enable_at_train: False
      enable_at_eval: True 

dataset:
  type: ImageFolderDataset
  shared_dataset_kwargs:
    data_path: /home/others/abir_proj/codebase/Datasets/CUB200/
  num_classes: 200
  image_augmentations:
    - type: TimmAug
      kwargs:
        input_size: 512
        color_jitter: 0.2
        aa: rand-m7-mstd0.5-inc1
        reprob: 0.2
        remode: pixel
        recount: 1
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
  test_image_augmentations:
    - type: TorchvisionResize
      kwargs:
        img_size: [512, 512]
    - type: TorchvisionCenterCrop
      kwargs:
        height: 512
        width: 512
    - type: TorchvisionToTensor
      kwargs: {}
    - type: NormalizeTensor2d
      kwargs:
        channel_means: [0.485, 0.456, 0.406]
        channel_stds: [0.229, 0.224, 0.225]

dataloader:
  batch_size: 32
  eval_batch_size: 32
  num_workers: 16
  train_drop_last: True
  val_drop_last: False
  multi_gpu_eval: True
  persistent_workers: False
  use_null_collate: False
  class_bal: False

engine:
  type: Classifier
  kwargs:
    accumulate_grad_batches: 4
    max_epochs: 30
    precision: bf16-mixed
    log_grad_norm: False
    log_max_min_lr: True
    gradual_unfreeze: False
    mixup_kwargs:
      mixup: 0.1
      cutmix: 0.1
      cutmix_minmax: null
      mixup_prob: 0.3
      mixup_switch_prob: 0.5
      mixup_mode: batch
      smoothing: 0.05

optimizer:
  type: AdamW
  kwargs:
    lr: 0.00005
    betas: [0.9, 0.999]
  timm_weight_decay: 0.05
  use_discriminative_lr: False
  backbone_lr: 0.00002
  head_lr: 0.0001
  scheduler:
    interval: step
    type: StepCosineAnnealingWarmup
    kwargs:
      warmup_epochs: 3
      max_epochs: 30
      min_lr: 1.e-6

model:
  type: Atlas
  kwargs:
    num_classes: 200
    img_size: [512, 512, 1]
    patch_size: [16, 16, 1]
    in_chans: 3
    embed_dim: 768
    pretrained: True
    pretrained_path: /home/others/abir_proj/codebase/Atlas/checkpoints/Atlas_in1k_512/atlas_d2d10_base_r512/epoch=95.ckpt
    load_head: False
    reset_head: True
    freeze_mode: except_last_stage
    freeze_stages: 0
    freeze_patterns: []
    kwargs_list:
      - img_size: [512, 512, 1]
        patch_size: 16
        local2global: 4
        merge_ratio: 16
        in_dim: 64
        dim: 768
        num_features: 192
        num_classes: 200
        drop_path_rate: 0.1
        global_pool: avg
        class_token: False
        depths: 2
        qkv_bias: True
        pre_norm: False
        num_heads: 12
        mlp_ratio: 4
        embed_dim: 768
        embed_op: convstem
        layer_args:
          qkv_bias: True
          qk_scale: None
          input_resolution: 512
      - img_size: [16, 16, 1]
        patch_size: 1
        local2global: 4
        merge_ratio: 16
        num_classes: 200
        drop_path_rate: 0.1
        global_pool: avg
        class_token: False
        depths: 10
        qkv_bias: True
        pre_norm: False
        num_heads: 12
        mlp_ratio: 4
        embed_dim: 768
        embed_op: conv2d
        in_dim: 64
        dim: 768
        num_features: 192
        layer_args:
          qkv_bias: True
          qk_scale: None
          input_resolution: 512